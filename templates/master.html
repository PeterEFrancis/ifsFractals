<!DOCTYPE html>
<html lang="en">
<head>
  <title>IFS Fractals</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="shortcut icon" href="static/img/leaf.gif" type="image/gif">

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

  <!-- datatables -->
  <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.10.22/css/jquery.dataTables.css">
  <script type="text/javascript" charset="utf8" src="https://cdn.datatables.net/1.10.22/js/jquery.dataTables.js"></script>

  <style>

    body {
      min-width: 250px;
    }

    br {
      user-select: none;
    }

  </style>
</head>
<body>


<div class="container" style="margin-bottom: 100px;">
  <div class="row">
    <div class="col-lg-12">
      <h1>Saved Playground Master List</h1>
      <table class="table" id="master_table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Info</th>
          </tr>
        </thead>
        <tbody>
          {% for playground in all %}
            <tr>
              <td><a href="/playground/{{playground.name}}">{{ playground.name }}</td>
              <td><div style="height:4em; overflow:scroll;">{{ playground.info }}</div></td>
            </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>


</body>

<script>
  $(document).ready( function () {
      $('#master_table').DataTable({
        "paging":   false
      });
  } );
</script>

</html>
